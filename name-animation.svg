<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <style>
    /* Die springenden Buchstaben */
    .letter {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-weight: 800;
      font-size: 55px;
      animation: bounce 2s infinite ease-in-out;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-20px); }
      60% { transform: translateY(-10px); }
    }

    /* Farben für deinen Namen */
    .c1 { fill: #FF3B30; animation-delay: 0.0s; }
    .c2 { fill: #FF9500; animation-delay: 0.1s; }
    .c3 { fill: #FFCC00; animation-delay: 0.2s; }
    .c4 { fill: #34C759; animation-delay: 0.3s; }
    .c5 { fill: #00C7BE; animation-delay: 0.4s; }
    .c6 { fill: #007AFF; animation-delay: 0.6s; }
    .c7 { fill: #5856D6; animation-delay: 0.7s; }
    .c8 { fill: #AF52DE; animation-delay: 0.8s; }

    /* Styling für die Roboterhände */
    .hand-main { fill: #2c3e50; stroke: #00FFFF; stroke-width: 2; }
    .hand-accent { fill: #00FFFF; }
    
    /* Schwebende Animation für die Hände */
    @keyframes hover-left {
      0%, 100% { transform: translate(60px, 40px) rotate(15deg); }
      50% { transform: translate(65px, 35px) rotate(10deg); }
    }
    @keyframes hover-right {
      0%, 100% { transform: translate(740px, 40px) scale(-1, 1) rotate(15deg); }
      50% { transform: translate(735px, 35px) scale(-1, 1) rotate(10deg); }
    }
    .hand-l { animation: hover-left 3s infinite ease-in-out; }
    .hand-r { animation: hover-right 3s infinite ease-in-out; }
  </style>

  <g class="hand-l">
    <path class="hand-main" d="M0,80 C-20,40 20,0 50,20 C80,40 100,80 80,110 C60,140 20,120 0,80 Z" />
    <path class="hand-main" d="M50,20 C60,-10 90,-10 100,20 L80,50 Z" />
    <path class="hand-main" d="M70,30 C90,10 110,20 110,40 L85,60 Z" />
    <path class="hand-main" d="M80,50 C100,30 120,50 110,70 L85,80 Z" />
    <circle cx="40" cy="70" r="10" class="hand-accent" />
  </g>

  <g class="hand-r">
    <path class="hand-main" d="M0,80 C-20,40 20,0 50,20 C80,40 100,80 80,110 C60,140 20,120 0,80 Z" />
    <path class="hand-main" d="M50,20 C60,-10 90,-10 100,20 L80,50 Z" />
    <path class="hand-main" d="M70,30 C90,10 110,20 110,40 L85,60 Z" />
    <path class="hand-main" d="M80,50 C100,30 120,50 110,70 L85,80 Z" />
    <circle cx="40" cy="70" r="10" class="hand-accent" />
  </g>

  <g transform="translate(235, 130)">
    <text class="letter c1" x="0">D</text>
    <text class="letter c2" x="40">e</text>
    <text class="letter c3" x="80">n</text>
    <text class="letter c4" x="120">i</text>
    <text class="letter c5" x="160">s</text>
    
    <text class="letter c6" x="240">C</text>
    <text class="letter c7" x="280">o</text>
    <text class="letter c8" x="320">x</text>
  </g>
</svg>
